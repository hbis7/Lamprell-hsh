<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamprell Safety Simulator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

<style>
body {font-family:'Cairo',sans-serif;background:#f8fafc}
.hidden{display:none}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold text-center mb-6">نظام السلامة</h1>

<div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow">

<input id="name" class="w-full p-3 border rounded mb-4" placeholder="اكتب اسمك">

<button onclick="start()" class="bg-red-600 text-white w-full p-3 rounded">ابدأ</button>

<div id="quiz" class="hidden mt-6">
<h2 id="q" class="text-xl font-bold mb-4"></h2>
<div id="answers"></div>
<p id="timer" class="mt-4 font-bold"></p>
</div>

<div id="result" class="mt-6 text-center font-bold"></div>

<hr class="my-6">

<h3 class="font-bold mb-2">🏆 لوحة الصدارة</h3>
<div id="board"></div>

</div>

<script>

// Firebase (جاهز)
const firebaseConfig = {
  apiKey: "AIzaSyCHnk6P-Y3vXb4vEN0pjS9ymbUoF2RqX-0",
  authDomain: "lamprell-hsh.firebaseapp.com",
  projectId: "lamprell-hsh",
  storageBucket: "lamprell-hsh.appspot.com",
  messagingSenderId: "312212863230",
  appId: "1:312212863230:web:ead88f3fd60c716d310daf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().signInAnonymously();

// الأسئلة
const SCENARIOS = [
{q:"وجدت سلك مكشوف ماذا تفعل؟",a:["أصلحه","أبلغ","أتجاهل"],c:1},
{q:"حريق؟",a:["أهرب","آخذ أغراضي","أستخدم المصعد"],c:0},
{q:"ماء على الأرض؟",a:["أبلغ","أتجاهل","أمشي"],c:0},
{q:"إيميل يطلب كلمة السر؟",a:["أعطيه","أبلغ IT","أتجاهل"],c:1}
];

let i=0,score=0,name="",time=0,timerInt;

// بدء
function start(){
name=document.getElementById("name").value;
if(!name) return alert("اكتب اسمك");

document.getElementById("quiz").classList.remove("hidden");
nextQ();
}

// سؤال
function nextQ(){
if(i>=SCENARIOS.length) return finish();

let q=SCENARIOS[i];
document.getElementById("q").innerText=q.q;

let html="";
q.a.forEach((x,idx)=>{
html+=`<button class="bg-gray-100 p-3 w-full rounded mt-2" onclick="answer(${idx})">${x}</button>`;
});
document.getElementById("answers").innerHTML=html;

startTimer();
}

// مؤقت
function startTimer(){
let t=10;
document.getElementById("timer").innerText="⏱ "+t;

clearInterval(timerInt);
timerInt=setInterval(()=>{
t--; time++;
document.getElementById("timer").innerText="⏱ "+t;
if(t<=0) answer(-1);
},1000);
}

// إجابة
function answer(idx){
clearInterval(timerInt);

if(idx===SCENARIOS[i].c) score++;

i++;
setTimeout(nextQ,500);
}

// نهاية
function finish(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").innerHTML=
`نتيجتك: ${score} | الوقت: ${time}s`;

db.collection("leaderboard").add({
name:name,
score:score,
time:time,
created:Date.now()
});

loadBoard();
}

// ليدربورد
async function loadBoard(){
let snap=await db.collection("leaderboard").get();
let arr=[];
snap.forEach(d=>arr.push(d.data()));

arr.sort((a,b)=>b.score-a.score || a.time-b.time);

let html="";
arr.slice(0,5).forEach((x,i)=>{
html+=`<p>#${i+1} ${x.name} - ${x.score} (${x.time}s)</p>`;
});

document.getElementById("board").innerHTML=html;
}

loadBoard();

</script>

</body>
</html>
